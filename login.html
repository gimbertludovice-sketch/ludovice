<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — LUDOVICE Kitchen &amp; Table</title>
<link rel="icon" href="img/mylogo.jpg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="nav">
  <div class="nav__row">
    <a href="index.html" class="nav__brand">
      <img src="img/mylogo.jpg" alt="LUDOVICE logo">
      <span class="nav__brand-text"><b>LUDOVICE</b><span>Kitchen &amp; Table</span></span>
    </a>
    <nav class="nav__links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>

      <a href="login.html" class="active">Login</a>

    </div>
  </div>
</header>

<section class="section" style="padding:90px 0;display:flex;justify-content:center;">
  <div class="container" style="max-width:460px;">
    <div class="form-card reveal is-visible">
      <div class="text-center" style="margin-bottom:28px;">
        <img src="img/mylogo.jpg" alt="LUDOVICE logo" style="width:64px;border-radius:50%;margin:0 auto 14px;">
        <h2>Welcome back</h2>
        <p>Log in to reorder your favorites.</p>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required minlength="8">
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <label class="check-item"><input type="checkbox" id="remember" name="remember"> Remember me</label>
          <a href="#" style="color:var(--orange);font-weight:700;font-size:.88rem;" id="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <div style="display:flex;align-items:center;gap:14px;margin:26px 0;color:var(--slate-light);font-size:.82rem;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        or find us here
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <div class="social-row">
        <a class="social-btn" href="https://www.facebook.com/gimmmyyy" target="_blank" rel="noopener" aria-label="LUDOVICE on Facebook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
          Facebook
        </a>
        <a class="social-btn" href="https://github.com/gimmmyyy" target="_blank" rel="noopener" aria-label="LUDOVICE on GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.54 2.87 8.39 6.84 9.75.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.51-3.5-.7-3.72-1.34-.13-.34-.68-1.34-1.16-1.61-.4-.22-.97-.76-.01-.77.9-.01 1.54.85 1.76 1.2 1.03 1.75 2.68 1.26 3.33.96.1-.75.4-1.26.73-1.55-2.55-.29-5.23-1.31-5.23-5.82 0-1.28.45-2.34 1.2-3.16-.12-.3-.52-1.53.11-3.18 0 0 .98-.32 3.2 1.2a10.9 10.9 0 015.83 0c2.22-1.53 3.2-1.2 3.2-1.2.63 1.65.23 2.88.11 3.18.75.82 1.2 1.87 1.2 3.16 0 4.52-2.69 5.53-5.25 5.82.41.36.77 1.08.77 2.18 0 1.58-.01 2.85-.01 3.24 0 .27.18.6.69.49A10.02 10.02 0 0022 12.26C22 6.58 17.52 2 12 2z"/></svg>
          GitHub
        </a>
        <a class="social-btn" href="mailto:gimbertludovice@student.trimex.colleges.edu.ph" aria-label="Email LUDOVICE">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1h-9.17v2.98h5.27c-.23 1.47-1.68 4.32-5.27 4.32-3.17 0-5.76-2.62-5.76-5.85s2.59-5.85 5.76-5.85c1.8 0 3.01.77 3.7 1.43l2.52-2.43C16.96 3.99 14.83 3 12.18 3 6.98 3 2.77 7.2 2.77 12.4s4.21 9.4 9.41 9.4c5.43 0 9.03-3.81 9.03-9.18 0-.62-.07-1.09-.15-1.52z"/></svg>
          Gmail
        </a>
      </div>

      <p class="text-center" style="margin-top:24px;font-size:.9rem;">New to LUDOVICE? <a href="register.html" style="color:var(--orange);font-weight:700;">Create an account</a></p>
    </div>
  </div>
</section>

<footer class="footer" style="padding-top:40px;">
  <div class="container">
    <div class="footer__bottom" style="border-top:1px solid var(--ink-line);padding-top:24px;">
      <span>© <span data-year></span> LUDOVICE Kitchen &amp; Table.</span>
      <span><a href="about.html">About</a> · <a href="contact.html">Contact</a></span>
